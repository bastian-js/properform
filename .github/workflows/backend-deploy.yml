name: Deploy Backend to Server

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOCS_SSH_HOST }}
          username: ${{ secrets.DOCS_SSH_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.DOCS_SSH_KEY }}
          script_stop: true
          script: |
            echo "Starting backend deploy on server..."
            whoami
            pwd
            ls -la /usr/local/bin/deploy-backend.sh
            /usr/local/bin/deploy-backend.sh
